<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css" />
    <title>登陆界面</title>
</head>
<body>
    <div id="bigBox">
        <h1>LOGIN</h1>
        <div class="inputBox">
            <div class="inputText">
                <input type="text" placeholder="UserName"/>
                <!-- placeholder: 框内提示 -->
            </div>
            <div class="inputText">
                <input type="password" placeholder="Password"/>
            </div>

            <input class="inputButton" type="button" value="LOGIN"/>
        </div>
    </div>
</body>
</html>
